      var lo = Infinity, hi = -Infinity;
      prods.forEach(function (p) { if (p.exhibit) return; var v = rawOf(p, d); if (v == null) return; if (v < lo) lo = v; if (v > hi) hi = v; });
      if (!isFinite(lo)) { lo = d.range ? d.range.min : 0; hi = d.range ? d.range.max : 10; }
      return { id: d.id, label: d.label, short: d.short || d.label, plainQuestion: d.plainQuestion || '', lo: lo, hi: hi };
    });
  }

  // floored softmax → weight SHARES for the positive dims (sum = 1; none can run to ~100%).
  // Before the softmax, spread-cap: if std(u) exceeds SPREAD_CAP, scale u down to that std so the
  // weight peakedness reflects the preference SHAPE (relative gaps), not the answer-count-driven
  // utility scale. Only shrinks — an indifferent buyer (small std) is left flat, not amplified.
  function shares(u) {
    var n = u.length, mx = -1e9, e = [], s = 0, k, mean = 0, sd = 0;
    for (k = 0; k < n; k++) mean += u[k]; mean /= n;
    for (k = 0; k < n; k++) sd += (u[k] - mean) * (u[k] - mean); sd = Math.sqrt(sd / n);
    var g = sd > SPREAD_CAP ? SPREAD_CAP / sd : 1;   // shift cancels in softmax → scale u directly
    for (k = 0; k < n; k++) if (u[k] * g * TEMP > mx) mx = u[k] * g * TEMP;
    for (k = 0; k < n; k++) { e[k] = Math.exp(u[k] * g * TEMP - mx); s += e[k]; }
    return e.map(function (x) { return FLOOR + (1 - n * FLOOR) * x / s; });
  }

  // ---- posterior: Newton MAP on the concave MNL log-posterior + full Hessian → covariance ----
  // obs: [[i,j], ...] meaning "positive dim i was preferred over dim j" (indices into posDims order)
  function hess(u, obs) {
    var n = u.length, H = [], a, b, o, i, j, p, w;
    for (a = 0; a < n; a++) { H[a] = []; for (b = 0; b < n; b++) H[a][b] = (a === b) ? 1 / TAU2 : 0; }
    for (o = 0; o < obs.length; o++) { i = obs[o][0]; j = obs[o][1]; p = sig(BETA * (u[i] - u[j])); w = BETA * BETA * p * (1 - p); H[i][i] += w; H[j][j] += w; H[i][j] -= w; H[j][i] -= w; }
    return H;
  }
  function fit(obs, n) {
    var u = new Array(n).fill(0), it, d, o, i, j, p, a, b;
    for (it = 0; it < 12; it++) {
      var g = []; for (d = 0; d < n; d++) g[d] = -u[d] / TAU2;
      for (o = 0; o < obs.length; o++) { i = obs[o][0]; j = obs[o][1]; p = sig(BETA * (u[i] - u[j])); g[i] += BETA * (1 - p); g[j] -= BETA * (1 - p); }
      var Hi = inv(hess(u, obs)), step = [], mx = 0;
      for (a = 0; a < n; a++) { var s = 0; for (b = 0; b < n; b++) s += Hi[a][b] * g[b]; step[a] = s; if (Math.abs(s) > mx) mx = Math.abs(s); }
      var sc = mx > 2 ? 2 / mx : 1; for (d = 0; d < n; d++) u[d] += sc * step[d];
    }
    return { u: u, S: inv(hess(u, obs)) };
  }

  // best-worst answer over a set of positive-dim indices → the implied pairwise observations
  function bestWorstObs(setIdx, best, worst) {
    var o = [];
    setIdx.forEach(function (d) { if (d !== best) o.push([best, d]); });
    setIdx.forEach(function (d) { if (d !== worst && d !== best) o.push([d, worst]); });
    return o;
  }

  // posterior MEAN → a full weight map {dimId: weight} (positive shares + authored anti-need weights),
  // shaped exactly like state.weights so compute()/smaa() consume it unchanged.
  function meanWeights(f, data) {
    var pd = posDims(data), sw = shares(f.u), w = {};
    pd.forEach(function (d, k) { w[d.id] = sw[k]; });
    antiDims(data).forEach(function (d) { w[d.id] = d.weight || 0; });
    return w;
  }

  // closure fed to smaa's weight seam: one correlated posterior draw → a full weight vector
  // aligned to data.dimensions order (positives = floored-softmax of the drawn utilities; antis = authored)
  function drawWeights(f, data) {
    var pd = posDims(data), n = pd.length, L = chol(f.S), dims = data.dimensions || [];
    var posOf = {}; pd.forEach(function (d, k) { posOf[d.id] = k; });
    return function (rnd, gauss) {
      var z = [], a, b, k; for (k = 0; k < n; k++) z[k] = gauss();
      var u = []; for (a = 0; a < n; a++) { var s = f.u[a]; for (b = 0; b <= a; b++) s += L[a][b] * z[b]; u[a] = s; }
      var sw = shares(u);
      return dims.map(function (d) { var j = posOf[d.id]; return (j != null) ? sw[j] : (d.weight || 0); });
    };
  }

  // recommendation + error margin: reuse the engine's SMAA with the posterior at the weight seam.
  // Keeps SMAA's per-cell evidence jitter (a second, independent uncertainty source).
  function confidence(data, f, opts) {
    opts = opts || {};
    var api = VF(); if (!api || !api.smaa) return null;
    var sm = api.smaa(data, { weights: meanWeights(f, data) }, { draws: opts.draws || 400, seed: 42, drawWeights: drawWeights(f, data) });
    var byId = {}; (data.products || []).forEach(function (p) { byId[p.id] = p; });
    var top = (sm.order || []).slice(0, 3).map(function (o) { var p = byId[o.id]; return { id: o.id, name: o.name, p: o.p, price: p ? p.price : null }; });
    return { order: sm.order, top: top, leader: sm.order && sm.order[0] ? sm.order[0].id : null, pickP: sm.pickP, nearTie: sm.nearTie };
  }

  // decision-focused, score-grounded, VARIED next question:
  // target where the live top-2 contenders most differ (× posterior sd, minus a recency penalty);
  // for size>2 add one exploration slot (most-uncertain, not just shown); never repeat the last set.
  function nextQuestion(data, f, size, recent) {
    var api = VF(); var pd = posDims(data), n = pd.length;
    var w = meanWeights(f, data);
    var res = api.compute(data, { weights: w });
    var live = res.rows.filter(function (r) { return !r.screenedOut && !r.overBudget && !r.exhibit; }).sort(function (a, b) { return b.value - a.value; });
    var L = live[0], R = live[1] || live[0];
    function raw(row, d) { var pt = row.parts.filter(function (q) { return q.id === d.id; })[0]; return pt ? pt.raw : 0; }
    var prev = recent || [];
    var rel = pd.map(function (d, k) {
      var span = (d.range ? (d.range.max - d.range.min) : 10) || 10;
      var diff = Math.abs(raw(L, d) - raw(R, d)) / span;
      return { k: k, r: (diff + 0.03) * Math.sqrt(Math.max(1e-6, f.S[k][k])) * (prev.indexOf(k) >= 0 ? 0.15 : 1) };
    }).sort(function (a, b) { return b.r - a.r; });
    var dims;
    if (size <= 2) dims = [rel[0].k, rel[1].k];
    else {
      dims = rel.slice(0, size - 1).map(function (x) { return x.k; });
      var expl = pd.map(function (d, k) { return { k: k, v: f.S[k][k] * ((prev.indexOf(k) >= 0 || dims.indexOf(k) >= 0) ? 0 : 1) }; }).sort(function (a, b) { return b.v - a.v; })[0].k;
      dims.push(expl);
    }
    return dims; // indices into posDims order
  }

  // cold-start set: the n biggest swings (broadest information first)
  function coldStart(data, size) {
    var sw = swings(data);
    return sw.map(function (s, k) { return { k: k, span: s.hi - s.lo }; }).sort(function (a, b) { return b.span - a.span; }).slice(0, size).map(function (x) { return x.k; });
  }

  // ================= v2: boundary confidence over the priority ladder =================
  // (spec: research/11 - adaptive elicitation v2.md — confidence lives on the DIMENSION
  //  ranking, importance-weighted, with ties declared by exhaustion; pickP stays on the page.)

  function phiN(x) { // standard normal CDF (Abramowitz-Stegun 26.2.17)
    var t = 1 / (1 + 0.2316419 * Math.abs(x)), d = 0.3989423 * Math.exp(-x * x / 2);
    var p = d * t * (0.3193815 + t * (-0.3565638 + t * (1.781478 + t * (-1.821256 + t * 1.330274))));
    return x >= 0 ? 1 - p : p;
  }
  function mulberry(a) { return function () { a |= 0; a = (a + 0x6D2B79F5) | 0; var t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; }; }
  function gaussOf(rnd) { var sp = null; return function () { if (sp != null) { var v0 = sp; sp = null; return v0; } var u, v, s; do { u = 2 * rnd() - 1; v = 2 * rnd() - 1; s = u * u + v * v; } while (!s || s >= 1); var m = Math.sqrt(-2 * Math.log(s) / s); sp = v * m; return u * m; }; }

  // adjacent-boundary scores on the MAP ladder. pairAsks[i][j] = how often i,j were co-shown.
  // b.p = P(i really outranks j) via the FULL posterior covariance; tie = asked enough, still murky.
  // meter = importance-weighted resolution (bottom-of-ladder fuzz can't hold it hostage);
  // done = meter >= target AND the top-3 boundaries individually resolved.
  function boundaries(f, data, pairAsks, target) {
    var n = posDims(data).length, sw = shares(f.u);
    var order = sw.map(function (v, k) { return [v, k]; }).sort(function (a, b) { return b[0] - a[0]; }).map(function (x) { return x[1]; });
    var bs = [], impSum = 0, acc = 0, k;
    for (k = 0; k < n - 1; k++) {
      var i = order[k], j = order[k + 1];
      var vv = Math.max(1e-9, f.S[i][i] + f.S[j][j] - 2 * f.S[i][j]);
      var p = phiN((f.u[i] - f.u[j]) / Math.sqrt(vv));
      var asks = pairAsks ? (pairAsks[i][j] || 0) : 0;
      var tie = asks >= TIE_ASKS && p < TIE_BELOW;
      var resolved = tie || p >= target;
      var imp = sw[i] + sw[j];
      bs.push({ i: i, j: j, p: p, tie: tie, resolved: resolved, imp: imp, asks: asks });
      impSum += imp; acc += imp * (tie ? 1 : p);
    }
    var meter = impSum > 0 ? acc / impSum : 1, topLocked = true;
    for (k = 0; k < Math.min(3, bs.length); k++) if (!bs[k].resolved) topLocked = false;
    return { order: order, bs: bs, meter: meter, topLocked: topLocked, allResolved: bs.every(function (b) { return b.resolved; }), done: meter >= target && topLocked };
  }

  // greedy near-balanced coverage set (BIBD spirit): least-shown dims first, then least-co-shown
  function coverageSet(data, size, appear, coocc) {
    var n = posDims(data).length, chosen = [];
    while (chosen.length < Math.min(size, n)) {
      var best = -1, bestScore = Infinity, k;
      for (k = 0; k < n; k++) {
        if (chosen.indexOf(k) >= 0) continue;
        var s = (appear[k] || 0), c;
        for (c = 0; c < chosen.length; c++) s += 0.5 * ((coocc[k] && coocc[k][chosen[c]]) || 0);
        if (s < bestScore) { bestScore = s; best = k; }
      }
      chosen.push(best);
    }
    return chosen;
  }

  // v2 question policy. st = { qn, appear, coocc, pairAsks, lastPair, target, endless, probeToggle }.
  // Phase A: balanced best-worst coverage · Phase B: weakest important boundary head-to-head
  // (every 3rd a triad with the least-seen dim) · Phase C (endless): spacing face-offs
  // alternating with consistency probes on pinned boundaries. Returns null when done (unless endless).
  function nextQuestion2(data, f, st) {
    var n = posDims(data).length;
    var covQ = n >= 8 ? 4 : (n >= 5 ? 3 : 2);
    if (st.qn <= covQ) return { dims: coverageSet(data, st.qn <= 2 ? 5 : 4, st.appear, st.coocc), kind: 'coverage' };
    var B = boundaries(f, data, st.pairAsks, st.target);
    if (B.done && !st.endless) return null;
    var open = B.bs.filter(function (b) { return !b.resolved; });
    if (open.length) {
      open.sort(function (a, b) { return (1 - b.p) * b.imp - (1 - a.p) * a.imp; });
      var w = open[0];
      if (st.lastPair && open.length > 1 && ((w.i === st.lastPair[0] && w.j === st.lastPair[1]) || (w.i === st.lastPair[1] && w.j === st.lastPair[0]))) w = open[1];
      if (st.qn % 3 === 0 && n > 3) {
        var least = -1, min = Infinity, k;
        for (k = 0; k < n; k++) if (k !== w.i && k !== w.j && (st.appear[k] || 0) < min) { min = st.appear[k] || 0; least = k; }
        return { dims: [w.i, w.j, least], kind: 'faceoff3' };
      }
      return { dims: [w.i, w.j], kind: 'faceoff' };
    }
    // endless refinement: alternate a consistency probe (re-ask a pinned boundary, reversed
    // presentation; flips feed the posterior AND the consistency score) with a spacing face-off
    st.probeToggle = !st.probeToggle;
    if (st.probeToggle) {
      var pin = B.bs.filter(function (b) { return b.resolved && !b.tie; }).sort(function (a, b) { return a.asks - b.asks || b.imp - a.imp; })[0];
      if (pin) return { dims: [pin.j, pin.i], kind: 'probe', expect: pin.i };
    }
    var sp = B.bs.slice().sort(function (a, b) { return a.p - b.p || b.imp - a.imp; })[0];
    return { dims: [sp.i, sp.j], kind: 'spacing' };
  }

  // PSER-style honesty: predicted meter gain if the user answers q. One Fisher-info update on
  // the asked pair's Δ-utility (variance shrinks) PLUS the expected mean movement from either
  // answer (the ladder re-sorts, so expected dominance uses |Δ|) — without the mean term a 50/50
  // boundary would read as zero gain exactly where a question helps most. Indirect (off-pair)
  // gains are ignored → this is a lower bound on usefulness.
  function predictedGain(f, data, st, q) {
    if (!q || !q.dims || q.dims.length < 2) return 0;
    var B0 = boundaries(f, data, st.pairAsks, st.target);
    var i = q.dims[0], j = q.dims[1];
    var acc = 0, impSum = 0;
    B0.bs.forEach(function (b) {
      var pb = b.p;
      if (!b.tie && ((b.i === i && b.j === j) || (b.i === j && b.j === i))) {
        var d = f.u[b.i] - f.u[b.j];
        var v0 = Math.max(1e-9, f.S[b.i][b.i] + f.S[b.j][b.j] - 2 * f.S[b.i][b.j]);
        var p = sig(BETA * d);
        var v1 = 1 / (1 / v0 + BETA * BETA * p * (1 - p));
        var sd = Math.sqrt(v1);
        pb = p * phiN(Math.abs(d + v1 * BETA * (1 - p)) / sd) + (1 - p) * phiN(Math.abs(d - v1 * BETA * p) / sd);
        pb = Math.max(pb, b.p);
      }
      impSum += b.imp; acc += b.imp * (b.tie ? 1 : pb);
    });
    return Math.max(0, (impSum > 0 ? acc / impSum : 1) - B0.meter);
  }

  // per-dimension share stats for the ladder UI: posterior mean + 90% credible whiskers
  function shareStats(f, data, draws, seed) {
    var dims = data.dimensions || [], posIdx = [];
    dims.forEach(function (d, i) { if (d.direction !== 'unwanted') posIdx.push(i); });
    var dw = drawWeights(f, data), rnd = mulberry(seed || 7), gauss = gaussOf(rnd), N = draws || 200;
    var samples = posIdx.map(function () { return []; });
    for (var t = 0; t < N; t++) { var w = dw(rnd, gauss); posIdx.forEach(function (pi, k) { samples[k].push(w[pi]); }); }
    return samples.map(function (s) {
      s.sort(function (a, b) { return a - b; });
      var q = function (p) { return s[Math.min(s.length - 1, Math.floor(p * s.length))]; };
      return { mean: s.reduce(function (a, b) { return a + b; }, 0) / s.length, lo: q(0.05), hi: q(0.95) };
    });
  }

  var api = {
    version: VERSION, params: { TEMP: TEMP, BETA: BETA, TAU2: TAU2, FLOOR: FLOOR, SPREAD_CAP: SPREAD_CAP, TIE_ASKS: TIE_ASKS, TIE_BELOW: TIE_BELOW, PSER_EPS: PSER_EPS },
    posDims: posDims, antiDims: antiDims, swings: swings, shares: shares,
    fit: fit, bestWorstObs: bestWorstObs, meanWeights: meanWeights, drawWeights: drawWeights,
    confidence: confidence, nextQuestion: nextQuestion, coldStart: coldStart,
    // v2 (boundary confidence on the priority ladder)
    boundaries: boundaries, coverageSet: coverageSet, nextQuestion2: nextQuestion2,
    predictedGain: predictedGain, shareStats: shareStats, phiN: phiN
  };
  if (typeof module !== 'undefined' && module.exports) module.exports = api;
  else (typeof globalThis !== 'undefined' ? globalThis : this).VFElicit = api;
})();
