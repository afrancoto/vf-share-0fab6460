<style>:root{
  color-scheme:light;  /* light-themed design — opt out of browser auto-darkening (Chrome "Darken websites"), which garbled the tabs to black-on-black */
  /* Value Desk — cool, data-forward surfaces; one teal accent leads the data */
  --bg:#f3f5f9; --ink:#0f1826; --muted:#4f5967; --faint:#8a94a3;
  --line:#e3e8ef; --line2:#eef1f6; --line3:#f3f6f9; --hair:#e9edf3;
  --card:#fff; --card-2:#f7f9fb; --head:#f4f7fa; --track:#e6ebf1;
  /* ONE decision accent (teal) — pick, cost, recommendation, value, frontier */
  --rec:#0f766e; --rec-2:#0b5f58; --ring:#cfe8e3; --rec-bg:#e7f4f2; --rec-border:#c4e4df;
  --front:#0f766e; --front-bg:#e7f4f2; --front-border:#c4e4df;
  /* semantic colours — penalty (coral) + caution (amber), kept distinct from the accent */
  --neg:#c0553d; --neg-bg:#fbeee9; --neg-border:#eecec4; --warn:#b06f12;
  --dom:#aab3c1; --screen:#dfe4ea; --screen-bd:#c8d0da;
  /* elevation language — soft, layered, consistent */
  --sh-1:0 1px 2px rgba(16,24,38,.05),0 1px 3px rgba(16,24,38,.05);
  --sh-2:0 2px 6px rgba(16,24,38,.05),0 10px 24px rgba(16,24,38,.07);
  --sh-pop:0 8px 30px rgba(16,24,38,.14);
  --r-card:14px; --r-md:10px; --r-sm:8px; --r-pill:999px; --appbar-h:54px;
  --serif:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
  --mono:'IBM Plex Mono',ui-monospace,'SFMono-Regular',Menlo,monospace;
  --sans:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);}
html{overflow-x:clip;}  /* guard: nothing may widen the page on mobile (clip keeps position:sticky working, unlike hidden) */
::selection{background:var(--ring);}
body{color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;}
#vf-app{max-width:1220px;margin:0 auto;padding:0 28px 72px;}

/* ---------- APP BAR (sticky chrome; full-bleeds #vf-app's padding) ---------- */
.vf-appbar{position:sticky;top:0;z-index:40;margin:0 -28px;padding:0 28px;background:rgba(250,251,253,.82);backdrop-filter:saturate(1.5) blur(12px);-webkit-backdrop-filter:saturate(1.5) blur(12px);border-bottom:1px solid var(--line);}
.vf-appbar-in{min-height:var(--appbar-h);display:flex;align-items:center;justify-content:space-between;gap:16px;}
.vf-decided{font-size:12px;padding:2px 10px;border:1px solid var(--rec-border);border-radius:999px;color:var(--rec);background:var(--rec-bg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;flex:0 1 auto;}
.vf-foot{font-size:11px;color:var(--faint);margin-top:20px;}  /* data-age footnote — small */
.vf-ptag{font-size:14.5px;color:var(--ink);line-height:1.5;margin:14px 0 2px;}  /* glanceable pick tagline (full note behind the ?) */
/* reusable "?" that reveals a one-off explanation on hover/focus */
.vf-help{position:relative;display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1px solid var(--line);color:var(--faint);font:600 10px/1 var(--sans);cursor:help;vertical-align:middle;margin-left:6px;flex:none;}
.vf-help:hover,.vf-help:focus-visible{border-color:var(--rec-border);color:var(--rec);outline:none;}
.vf-help-tip{position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);width:max-content;max-width:min(280px,74vw);background:var(--ink);color:#fff;font:400 12px/1.45 var(--sans);letter-spacing:normal;text-transform:none;text-align:left;padding:8px 11px;border-radius:8px;box-shadow:var(--sh-2);opacity:0;visibility:hidden;transition:opacity .12s;z-index:40;pointer-events:none;white-space:normal;}
.vf-help:hover .vf-help-tip,.vf-help:focus .vf-help-tip,.vf-help:focus-within .vf-help-tip{opacity:1;visibility:visible;}
.vf-brand{display:flex;align-items:center;gap:10px;min-width:0;flex-shrink:0;}
.vf-brand-mark{width:17px;height:17px;border-radius:5px;background:linear-gradient(135deg,var(--rec),#3aa89b);box-shadow:inset 0 0 0 1px rgba(0,0,0,.07),0 1px 2px rgba(15,118,110,.25);flex:0 0 auto;}
.vf-brand-name{font-family:var(--serif);font-weight:600;font-size:15px;letter-spacing:-.01em;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vf-appbar-reset{font-family:inherit;font-size:12.5px;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:var(--r-pill);padding:6px 14px;cursor:pointer;white-space:nowrap;box-shadow:var(--sh-1);transition:color .12s,border-color .12s;}
.vf-appbar-reset:hover{color:var(--rec);border-color:var(--rec-border);}
.vf-num{font-variant-numeric:tabular-nums;}
h1,h2,h3{font-family:var(--serif);font-weight:600;letter-spacing:-.01em;color:var(--ink);margin:0;}
button{font-family:inherit;}
:focus-visible{outline:2px solid var(--rec);outline-offset:2px;border-radius:3px;}

/* ---------- TOP ---------- */
.vf-top{padding:30px 0 6px;}
.vf-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint);margin-bottom:10px;}
.vf-h1{font-size:33px;line-height:1.06;letter-spacing:-.015em;}
.vf-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;}
.vf-link{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:12px;letter-spacing:.02em;padding:6px 13px;border-radius:999px;background:var(--rec-bg);color:var(--rec);border:1px solid var(--rec-border);text-decoration:none;transition:background .15s,border-color .15s;}
.vf-link:hover{background:var(--ring);border-color:var(--rec);}

/* ---------- VERDICT (the answer — an elevated focus card) ---------- */
.vf-verdict{margin:16px 0 26px;background:var(--card);border:1px solid var(--line);border-left:3px solid var(--rec);border-radius:var(--r-card);box-shadow:var(--sh-1);padding:16px 20px 17px;}
.vf-verdict-head{font-size:16.5px;line-height:1.5;color:var(--ink);max-width:880px;}
.vf-verdict-head b{font-weight:600;}
.vf-verdict-lead{font-family:var(--serif);font-weight:600;font-size:19px;color:var(--rec);}
.vf-verdict-flip{font-size:13px;color:var(--muted);line-height:1.5;margin-top:9px;padding-top:9px;border-top:1px solid var(--line2);max-width:880px;}
.vf-verdict-flip b{color:var(--ink);font-weight:600;}

/* ---------- WORKSPACE: chart-col | inspector ---------- */
.vf-workspace{display:grid;grid-template-columns:1.5fr 1fr;gap:26px;align-items:start;}
@media(max-width:980px){.vf-workspace{grid-template-columns:1fr;gap:22px;}}
.vf-chart-col{min-width:0;display:flex;flex-direction:column;}

.vf-charthead{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:9px;}
.vf-h2{font-size:19px;}
.vf-h2-sub{font-family:var(--sans);font-weight:400;font-size:13.5px;color:var(--faint);letter-spacing:0;}
.vf-cap{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.45;max-width:560px;}
.vf-legend-heat{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
.vf-heat-lab{font-weight:600;color:var(--ink);}
.vf-heat-bar{width:78px;height:9px;border-radius:5px;background:linear-gradient(90deg,rgb(210,200,185),rgb(184,67,15));border:1px solid var(--line);}
.vf-heat-ends{font-family:var(--mono);font-size:10px;letter-spacing:.04em;color:var(--faint);}

.vf-card{position:relative;border:1px solid var(--line);border-radius:var(--r-card);background:var(--card);padding:10px 12px 4px 4px;box-shadow:var(--sh-2);}
.vf-chart-tools{position:absolute;top:10px;right:12px;display:flex;gap:6px;z-index:3;align-items:center;}
.vf-tool{width:30px;height:28px;border:1px solid var(--line);background:var(--card);color:var(--muted);border-radius:6px;cursor:pointer;font-size:15px;line-height:1;display:flex;align-items:center;justify-content:center;}
.vf-tool:hover{border-color:var(--dom);color:var(--ink);}
.vf-tool-adjust{width:auto;padding:0 11px;gap:6px;color:var(--ink);border-color:var(--dom);font-weight:500;}
.vf-tool-adjust .vf-tool-ic{font-size:14px;}
.vf-tool-adjust .vf-tool-tx{font-size:12.5px;}
.vf-seg-presets{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--card);}
.vf-segp{font-size:11.5px;border:none;background:none;color:var(--muted);padding:0 10px;height:28px;cursor:pointer;border-right:1px solid var(--line);}
.vf-segp:last-child{border-right:none;}
.vf-segp:hover{color:var(--ink);}
.vf-segp.on{background:var(--ink);color:#fff;}
.vf-card:fullscreen,.vf-card.vf-fs{display:flex;flex-direction:column;justify-content:center;padding:28px;background:var(--bg);}
.vf-card:fullscreen .vf-plot,.vf-card.vf-fs .vf-plot{width:100%;max-width:1500px;margin:0 auto;}
.vf-card:fullscreen .vf-svg,.vf-card.vf-fs .vf-svg{max-height:88vh;}

/* chart svg */
.vf-plot{position:relative;}
.vf-svg{display:block;width:100%;height:auto;touch-action:manipulation;}
.vf-grid{stroke:var(--hair);stroke-width:1;}
.vf-tick{fill:var(--faint);font-size:11px;font-family:var(--mono);text-anchor:middle;}
.vf-tick-y{text-anchor:end;}
.vf-axhint{fill:var(--faint);font-size:10px;font-family:var(--mono);letter-spacing:.1em;text-anchor:start;}
.vf-axhint-r{text-anchor:end;}
.vf-frontier{fill:none;stroke:var(--front);stroke-width:2;stroke-linejoin:round;opacity:.85;}
.vf-frontier-cap{fill:var(--front);font-size:10.5px;font-family:var(--mono);letter-spacing:.02em;text-anchor:end;opacity:.9;}
.vf-budgetline{stroke:var(--rec);stroke-width:1.3;stroke-dasharray:4 4;opacity:.6;}
.vf-budget-lab{fill:var(--rec);font-size:10px;font-family:var(--mono);letter-spacing:.03em;}
.vf-pt-g{cursor:pointer;}
.vf-pt{stroke:#fff;stroke-width:1.5;transition:opacity .12s ease;}
.vf-pt-rec{fill:var(--rec);}
.vf-pt-front{fill:var(--front);}
.vf-pt-dom{fill:var(--dom);}
.vf-pt-screen{fill:var(--screen);stroke:var(--screen-bd);}
.vf-pt-lens{stroke:#7a8494;stroke-width:1.4;}
/* transparent finger-friendly hit halo per dot group (>=14 viewBox-unit radius) */
.vf-pt-hit{fill:transparent;pointer-events:all;}
.vf-pt-selring{fill:none;stroke:var(--ink);stroke-width:2;opacity:.75;}
.vf-pt-recring{fill:none;stroke:var(--rec);stroke-width:1.5;opacity:.45;}
.vf-pt-lab{fill:var(--ink);font-size:12px;font-weight:600;font-family:var(--serif);paint-order:stroke;stroke:var(--bg);stroke-width:3px;}
.vf-pt-lab-rec{fill:var(--rec);}
.vf-pt-sublab{fill:var(--muted);font-size:10px;font-family:var(--mono);letter-spacing:.02em;paint-order:stroke;stroke:var(--bg);stroke-width:3px;}
.vf-svg.vf-hovering .vf-pt-g:not(.vf-pt-hot) .vf-pt{opacity:.28;}
.vf-svg.vf-hovering .vf-pt-g:not(.vf-pt-hot) .vf-pt-lab,.vf-svg.vf-hovering .vf-pt-g:not(.vf-pt-hot) .vf-pt-sublab{opacity:.35;}
.vf-pt-g.vf-pt-hot .vf-pt{stroke-width:2.5;}
.vf-axisnote{font-size:10.5px;font-family:var(--mono);color:var(--faint);text-align:center;margin:6px 8px 4px;}

/* custom tooltip */
.vf-tip{position:absolute;z-index:5;pointer-events:none;background:var(--ink);color:#fff;border-radius:8px;padding:9px 11px;min-width:140px;box-shadow:0 6px 20px rgba(16,24,38,.22);font-size:12px;}
.vf-tip-name{font-family:var(--serif);font-weight:600;font-size:13px;margin-bottom:5px;line-height:1.2;}
.vf-tip-row{display:flex;justify-content:space-between;gap:14px;color:#c3cad6;padding:1px 0;}
.vf-tip-row b{color:#fff;}
.vf-tip-status{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;margin-top:6px;filter:brightness(1.5);}
.vf-tip-hint{font-size:10px;color:#aab3c1;margin-top:3px;}

/* ---------- ON-PAGE CONTROLS (docked under the chart) ---------- */
.vf-controls-slot{margin-top:16px;}
.vf-controls{border:1px solid var(--line);border-radius:var(--r-card);background:var(--card);padding:15px 17px;box-shadow:var(--sh-1);}
.vf-wbar{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--line2);}
.vf-wbar-h{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--ink);margin-bottom:8px;display:flex;flex-wrap:wrap;gap:3px 10px;align-items:baseline;}
.vf-wbar-sub{font-family:var(--serif);text-transform:none;letter-spacing:0;font-size:11.5px;font-style:italic;font-weight:400;color:var(--muted);}
.vf-wbar-track{display:flex;height:15px;border-radius:5px;overflow:hidden;background:var(--track);border:1px solid var(--line);}
.vf-wbar-seg{height:100%;cursor:pointer;transition:filter .12s;border-right:1px solid rgba(255,255,255,.55);}
.vf-wbar-seg:last-child{border-right:none;}
.vf-wbar-seg:hover{filter:brightness(1.12) saturate(1.2);}
.vf-wbar-seg.on{box-shadow:inset 0 0 0 2px var(--ink);}
.vf-wbar-keys{display:flex;flex-wrap:wrap;gap:5px 14px;margin-top:9px;}
.vf-wbar-key{font-size:11px;color:var(--muted);display:inline-flex;align-items:center;gap:5px;}
.vf-wbar-key b{color:var(--ink);}
.vf-wbar-sw{width:9px;height:9px;border-radius:2px;display:inline-block;}
/* priorities — sliders are always visible (the page's core interaction, not hidden) */
.vf-prios{margin:16px 0 4px;}
.vf-prios-h{font-family:var(--sans);font-size:13px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--ink);display:flex;flex-wrap:wrap;gap:3px 10px;align-items:baseline;margin-bottom:12px;}
.vf-prios-sub{font-family:var(--serif);text-transform:none;letter-spacing:0;font-size:11.5px;font-style:italic;font-weight:400;color:var(--muted);flex-basis:100%;}
/* penalties — surfaced right under the priorities (separate signed docks, not part of the 100% pie) */
.vf-pens{margin:15px 0 2px;padding-top:14px;border-top:1px dashed var(--line);}
.vf-pens-h{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);display:flex;flex-wrap:wrap;gap:3px 10px;align-items:baseline;margin-bottom:11px;}
.vf-pens-sub{font-family:var(--serif);text-transform:none;letter-spacing:0;font-size:11.5px;font-style:italic;color:var(--faint);}
.vf-reset-all{margin-left:auto;background:none;border:1px solid var(--line);border-radius:999px;color:var(--rec);font-family:inherit;font-size:11px;letter-spacing:.02em;padding:4px 11px;cursor:pointer;white-space:nowrap;}
.vf-reset-all:hover{border-color:var(--rec);background:var(--rec-bg);}
.vf-ctrl-primary{display:flex;gap:26px;flex-wrap:wrap;align-items:flex-start;margin-top:16px;padding-top:14px;border-top:1px solid var(--line2);}
.vf-ctrl-field{display:flex;flex-direction:column;gap:8px;}
.vf-ctrl-lab{font-family:var(--sans);font-size:12px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--ink);}
.vf-ctrl-hint{text-transform:none;letter-spacing:0;font-family:var(--serif);font-weight:400;font-style:italic;font-size:11px;color:var(--muted);}
.vf-segwrap{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--bg);width:fit-content;}
.vf-seg{font-size:12.5px;border:none;background:none;color:var(--muted);padding:7px 15px;cursor:pointer;border-right:1px solid var(--line);}
.vf-seg:last-child{border-right:none;}
.vf-seg:hover{color:var(--ink);}
.vf-seg.on{background:var(--ink);color:#fff;}
.vf-budget-field{min-width:180px;}
.vf-budget-row{display:flex;align-items:center;gap:10px;}
.vf-budget-row input[type=range]{flex:1;accent-color:var(--rec);height:4px;cursor:pointer;min-width:110px;}
.vf-budget-val{font-family:var(--mono);font-size:12px;color:var(--rec);min-width:64px;}
.vf-chips{display:flex;gap:7px;flex-wrap:wrap;}
.vf-chip{font-size:12px;border:1px solid var(--line);background:var(--bg);color:var(--muted);padding:5px 12px;border-radius:999px;cursor:pointer;}
.vf-chip:hover{border-color:var(--dom);color:var(--ink);}
.vf-chip-on{background:var(--ink);color:#fff;border-color:var(--ink);}
.vf-adv{margin-top:14px;border-top:1px solid var(--line2);padding-top:12px;}
.vf-adv>summary{cursor:pointer;list-style:none;font-size:12.5px;color:var(--rec);font-weight:500;}
.vf-adv>summary::-webkit-details-marker{display:none;}
.vf-adv>summary::before{content:"▸ ";color:var(--faint);}
.vf-adv[open]>summary::before{content:"▾ ";}
.vf-adv-body{margin-top:12px;}
.vf-ctrl-row{flex-direction:row;align-items:baseline;gap:12px;flex-wrap:wrap;}
.vf-wts{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:6px 24px;margin-top:14px;align-items:center;}
.vf-wt{display:grid;grid-template-columns:1fr 92px;align-items:center;gap:10px;font-size:12.5px;color:var(--muted);}
.vf-wt-lab{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vf-wt input[type=range]{grid-column:1 / -1;grid-row:2;width:100%;accent-color:var(--rec);height:4px;cursor:pointer;}
.vf-wt-val{grid-column:2;grid-row:1;font-variant-numeric:tabular-nums;color:var(--muted);text-align:right;font-family:var(--mono);font-size:11px;}
.vf-wt-val b{color:var(--ink);}
.vf-wt-pct{color:var(--rec);font-weight:600;}
.vf-reset{grid-column:1 / -1;justify-self:start;margin-top:8px;font-size:12px;color:var(--rec);background:none;border:none;cursor:pointer;text-decoration:underline;padding:4px 0;}

/* ---------- progressive disclosure (collapse on mobile; reasoning collapsed everywhere) ---------- */
.vf-ctrl-toggle{display:none;width:100%;align-items:center;justify-content:space-between;gap:10px;background:none;border:none;font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--rec);cursor:pointer;padding:2px 0;}
.vf-ctrl-toggle-ic{color:var(--faint);font-size:13px;}
.vf-deep-toggle{display:none;width:100%;margin-top:16px;background:var(--bg);border:1px solid var(--line);border-radius:9px;padding:11px 12px;font-size:13px;color:var(--rec);cursor:pointer;font-family:inherit;}
.vf-deep-toggle:hover{border-color:var(--dom);}
.vf-why-toggle{margin-left:auto;background:none;border:none;font-family:var(--mono);font-size:10px;letter-spacing:.03em;color:var(--rec);cursor:pointer;padding:0;text-transform:none;}
.vf-why-toggle:hover{text-decoration:underline;}
.vf-col-why:not(.vf-why-on) .vf-wf-why{display:none;}
.vf-collapsed{display:none;}
@media(min-width:641px){
  .vf-collapsed{display:block;}             /* desktop keeps the cockpit fully open */
  .vf-ctrl-toggle,.vf-deep-toggle{display:none !important;}
}
@media(max-width:640px){
  .vf-ctrl-toggle{display:flex;}
  .vf-deep-toggle{display:block;}
}

/* ---------- INSPECTOR rail (scrolls in its own column) ---------- */
.vf-detail{border:1px solid var(--line);border-radius:var(--r-card);background:var(--card);padding:20px 22px;align-self:start;position:sticky;top:calc(var(--appbar-h) + 14px);max-height:calc(100vh - var(--appbar-h) - 28px);max-height:calc(100dvh - var(--appbar-h) - 28px);overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:var(--sh-2);}
@media(max-width:980px){.vf-detail{position:static;max-height:none;overflow:visible;}}
.vf-detail-top{padding-bottom:15px;border-bottom:1px solid var(--hair);}
.vf-detail-tagline{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap;}
.vf-detail-view{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
.vf-detail-name{font-family:var(--serif);font-size:21px;font-weight:600;line-height:1.14;}
.vf-stat{display:flex;gap:30px;margin-top:14px;}
.vf-stat-lab{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:3px;font-family:var(--mono);}
.vf-stat-val{font-family:var(--serif);font-size:25px;font-weight:600;line-height:1;}
.vf-stat-cost{color:var(--rec);}
.vf-vsrec{font-size:12px;color:var(--muted);margin-top:12px;}
.vf-vsrec b{color:var(--ink);font-variant-numeric:tabular-nums;}
.vf-pnote{font-size:12.5px;color:var(--muted);font-style:italic;margin:14px 0 0;line-height:1.45;}
.vf-flaws{font-size:12.5px;color:var(--muted);margin:13px 0 0;line-height:1.45;}
.vf-flaws-lab{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);}
.vf-buy{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:14px 0 0;}
.vf-buy-lab{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
.vf-buy-link{font-size:13px;color:var(--rec);text-decoration:none;border-bottom:1px solid var(--ring);}
.vf-buy-link:hover{border-bottom-color:var(--rec);}
.vf-col{margin-top:18px;}
.vf-col-h{font-size:12.5px;font-weight:600;letter-spacing:0;text-transform:none;color:var(--ink);font-family:var(--sans);margin-bottom:10px;display:flex;flex-wrap:wrap;gap:3px 8px;align-items:baseline;}
.vf-col-sub{font-family:var(--serif);text-transform:none;letter-spacing:0;font-size:11.5px;font-style:italic;font-weight:400;color:var(--muted);}

/* value waterfall */
.vf-wf{padding:7px 0;border-bottom:1px solid var(--line3);}
.vf-wf-lenson{background:var(--rec-bg);border-radius:7px;border-bottom-color:transparent;margin:0 -8px;padding:7px 8px;}
.vf-wf-head{display:flex;align-items:baseline;gap:8px;}
.vf-wf-lab{font-size:13px;color:var(--ink);font-weight:500;flex:1;}
.vf-wf-meta{font-size:10px;color:var(--faint);white-space:nowrap;}
.vf-wf-amt{font-size:12.5px;font-weight:600;font-variant-numeric:tabular-nums;width:44px;text-align:right;}
.vf-amt-pos{color:var(--front);} .vf-amt-neg{color:var(--neg);}
.vf-wf-track{position:relative;height:10px;margin:5px 0 0;background:var(--track);border-radius:3px;}
.vf-wf-bar{position:absolute;top:0;bottom:0;border-radius:2px;min-width:2px;}
.vf-wf-bar.pos{background:var(--front);}
.vf-wf-bar.neg{background:var(--neg);}
.vf-wf-bar.total{background:var(--ink);}
.vf-wf-why{font-size:11.5px;color:var(--faint);margin-top:5px;font-style:italic;line-height:1.4;}
.vf-conf{font-family:var(--mono);font-style:normal;font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:1px 5px;border-radius:4px;margin-right:5px;vertical-align:1px;border:1px solid;}
.vf-conf-tested{background:var(--rec-bg);color:var(--rec);border-color:var(--rec-border);}
.vf-conf-reviews{background:#fbf4e7;color:var(--warn);border-color:#e6d2ab;}
.vf-conf-spec{background:var(--line3);color:var(--muted);border-color:var(--line);}
.vf-conf-est{background:var(--line3);color:var(--faint);border-color:var(--line);}
.vf-wf-total{border-bottom:none;border-top:1.5px solid var(--line);margin-top:4px;padding-top:9px;}
.vf-wf-total .vf-wf-lab{font-weight:600;font-family:var(--serif);font-size:14px;}
.vf-wf-total .vf-wf-amt{font-family:var(--serif);font-size:15px;color:var(--ink);}
.vf-br-src{color:var(--front);}

/* cost bars (parity with value) */
.vf-cb{display:grid;grid-template-columns:1fr 80px 60px;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line3);}
.vf-cb-lab{font-size:11.5px;color:var(--ink);line-height:1.3;}
.vf-cb-track{height:9px;background:var(--track);border-radius:3px;position:relative;overflow:hidden;}
.vf-cb-bar{position:absolute;left:0;top:0;bottom:0;background:var(--rec);border-radius:3px;opacity:.85;}
.vf-cb-bar.neg{background:var(--front);}
.vf-cb-amt{font-size:12.5px;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums;}
.vf-cb-total{border-bottom:none;border-top:1.5px solid var(--line);margin-top:3px;padding-top:9px;}
.vf-cb-total .vf-cb-lab{font-weight:600;font-size:12.5px;}
.vf-cb-total .vf-cb-amt{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--rec);}

/* ---------- TABS (pill segmented control; Overview hosts the chart workspace) ---------- */
.vf-tabs{margin-top:18px;}
.vf-overview{padding-top:22px;}
.vf-tabnav{display:inline-flex;gap:3px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-pill);padding:4px;box-shadow:var(--sh-1);max-width:100%;overflow-x:auto;flex-wrap:nowrap;scrollbar-width:none;}
.vf-tabnav::-webkit-scrollbar{display:none;}
.vf-tab{font-family:var(--sans);font-size:13.5px;font-weight:500;color:var(--muted);background:none;border:none;border-radius:var(--r-pill);padding:8px 16px;cursor:pointer;white-space:nowrap;transition:color .12s,background .12s;}
.vf-tab:hover{color:var(--ink);}
.vf-tab-on{color:#fff;background:var(--ink);}
.vf-tabpanel{padding:22px 0 0;}
.vf-subcap{font-size:12.5px;color:var(--muted);margin-bottom:14px;line-height:1.5;max-width:760px;}

/* Table-Lens matrix */
.vf-tl{border:1px solid var(--line);border-radius:var(--r-card);overflow:auto;max-height:calc(100dvh - var(--appbar-h) - 32px);-webkit-overflow-scrolling:touch;background:var(--card);box-shadow:var(--sh-1);}
.vf-tl-row{display:grid;grid-template-columns:minmax(168px,1.7fr) 48px repeat(var(--vf-tl-cols),minmax(78px,1fr));align-items:stretch;min-width:720px;border-bottom:1px solid var(--line2);}
.vf-tl-row[data-id]:nth-child(even){background:rgba(15,24,38,.02);}
.vf-tl-row[data-id]:nth-child(even) .vf-tl-name{background:#f7f9fb;}
.vf-tl-row:last-child{border-bottom:none;}
.vf-tl-head{position:sticky;top:0;background:var(--head);z-index:2;border-bottom:1px solid var(--line);}
.vf-tl-h{font-family:var(--mono);font-size:10px;letter-spacing:.02em;text-transform:uppercase;color:var(--faint);padding:9px 8px;cursor:pointer;user-select:none;display:flex;align-items:center;}
.vf-tl-cell.vf-tl-h{justify-content:flex-end;text-align:right;min-width:0;overflow:hidden;overflow-wrap:break-word;line-height:1.16;}
.vf-tl-h:hover{color:var(--ink);}
.vf-tl-h-on{color:var(--rec);}
.vf-tl-name{position:sticky;left:0;background:var(--card);z-index:1;padding:10px 14px 10px 12px;font-size:13px;font-weight:500;line-height:1.25;display:flex;align-items:center;gap:8px;min-width:0;box-shadow:1px 0 0 var(--line2);}
.vf-tl-head .vf-tl-name{background:var(--head);box-shadow:1px 0 0 var(--line);}
.vf-tl-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vf-tl-cell{position:relative;padding:8px;display:flex;align-items:center;justify-content:flex-end;gap:6px;}
.vf-tl-bar{position:absolute;left:8px;bottom:5px;height:4px;border-radius:2px;background:var(--front);opacity:.5;max-width:calc(100% - 16px);}
.vf-tl-bar.neg{background:var(--neg);opacity:.45;}
.vf-tl-fig{position:relative;font-size:12.5px;color:var(--ink);font-variant-numeric:tabular-nums;}
.vf-tl-row[data-id]{cursor:pointer;}
.vf-tl-row[data-id]:hover,.vf-tl-row.vf-brush-hot{background:rgba(15,24,38,.045);}
.vf-tl-row[data-id]:hover .vf-tl-name,.vf-tl-row.vf-brush-hot .vf-tl-name{background:#eef1f6;}
.vf-tl-rec .vf-tl-name{font-weight:600;}
.vf-tl-dim{opacity:.55;}
.vf-tl-sel{background:var(--rec-bg) !important;}
.vf-tl-sel .vf-tl-name{background:var(--rec-bg) !important;box-shadow:inset 3px 0 0 var(--rec),1px 0 0 var(--line2);}
/* medals (muted metal, no bling) + status dot */
/* dark digits on the metal fills — white on gold/silver/bronze failed AA (2.5-3.7:1) */
.vf-medal{flex:0 0 auto;width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--ink);box-shadow:inset 0 0 0 1px rgba(16,24,38,.22);}
.vf-medal-1{background:#c19a2e;}
.vf-medal-2{background:#a7a59c;}
.vf-medal-3{background:#ac7b46;}
.vf-sdot{flex:0 0 auto;width:8px;height:8px;border-radius:50%;display:inline-block;margin:0 5px;background:var(--dom);}
.vf-sdot.vf-b-front{background:var(--front);}
.vf-sdot.vf-b-dom{background:var(--dom);}
.vf-sdot.vf-b-rec{background:var(--rec);}
.vf-sdot.vf-b-screen{background:var(--screen-bd);}
.vf-leg-dot{margin:0 1px -1px;}
.vf-leg-medal{font-family:var(--mono);color:var(--ink);}
.vf-row-star{color:var(--rec);}
.vf-badge{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:2px 7px;border-radius:4px;white-space:nowrap;border:1px solid;}
.vf-b-rec{background:var(--rec);color:#fff;border-color:var(--rec);}
.vf-b-front{background:var(--rec-bg);color:var(--rec);border-color:var(--rec-border);}
.vf-b-dom{background:var(--line2);color:var(--faint);border-color:var(--line);}
.vf-b-screen{background:var(--line3);color:var(--muted);border-color:var(--screen);}

/* head-to-head compare */
.vf-cmp-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:560px){.vf-cmp-pick{grid-template-columns:1fr;}}
.vf-cmp-sel{font-family:inherit;font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);width:100%;cursor:pointer;}
.vf-cmp-sel:hover{border-color:var(--dom);}
.vf-cmp-wrap{border:1px solid var(--line);border-radius:var(--r-card);overflow-x:auto;background:var(--card);box-shadow:var(--sh-1);}
.vf-cmp-table{min-width:480px;}
.vf-cmp-row{display:grid;grid-template-columns:minmax(140px,1.3fr) repeat(var(--n),1fr);border-bottom:1px solid var(--line2);}
.vf-cmp-row:last-child{border-bottom:none;}
.vf-cmp-lab{position:sticky;left:0;background:var(--card);padding:9px 12px;font-size:12.5px;color:var(--ink);display:flex;flex-direction:column;gap:1px;justify-content:center;box-shadow:1px 0 0 var(--line2);z-index:1;}
.vf-cmp-lab-sub{font-size:10px;color:var(--faint);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;}
.vf-cmp-cell{position:relative;padding:9px 12px;display:flex;align-items:center;justify-content:flex-end;gap:5px;border-left:1px solid var(--line3);min-width:0;}
.vf-cmp-fig{font-variant-numeric:tabular-nums;font-size:13px;color:var(--ink);position:relative;}
.vf-cmp-bar{position:absolute;left:8px;bottom:5px;height:4px;border-radius:2px;opacity:.4;max-width:calc(100% - 44px);}
.vf-cmp-win{background:var(--rec-bg);}
.vf-cmp-win .vf-cmp-fig{font-weight:700;color:var(--rec);}
.vf-cmp-tick{color:var(--rec);font-size:11px;line-height:1;}
.vf-cmp-h{background:var(--head);border-bottom:1px solid var(--line);}
.vf-cmp-h .vf-cmp-lab{background:var(--head);box-shadow:1px 0 0 var(--line);}
.vf-cmp-name{flex-direction:column;align-items:flex-end;gap:3px;font-family:var(--serif);font-weight:600;font-size:13.5px;line-height:1.16;text-align:right;}
.vf-cmp-badge{font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;font-weight:400;}
.vf-cmp-sum{background:#f7f9fb;}
.vf-cmp-sum .vf-cmp-lab{background:#f7f9fb;font-weight:600;}
.vf-cmp-section{padding:8px 12px;background:var(--head);font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);border-bottom:1px solid var(--line2);border-top:1px solid var(--line);display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;}
.vf-cmp-section-sub{font-family:var(--serif);text-transform:none;letter-spacing:0;font-style:italic;font-size:11px;color:var(--faint);}
.vf-cmp-cost .vf-cmp-fig{color:var(--muted);}
.vf-cmp-anti .vf-cmp-lab{color:var(--muted);}
.vf-cmp-assess-wrap{margin-top:18px;border-top:1px solid var(--line2);padding-top:16px;}
.vf-cmp-assess-title{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:11px;}
.vf-cmp-assess{border-left:3px solid var(--front);padding:2px 0 2px 14px;margin-bottom:15px;}
.vf-cmp-assess:last-child{margin-bottom:0;}
.vf-cmp-assess-h{font-family:var(--serif);font-weight:600;font-size:14px;margin-bottom:5px;}
.vf-cmp-assess p{font-size:13px;color:var(--muted);line-height:1.55;margin:0;}
.vf-cmp-flag{margin-top:7px;font-size:12px;color:var(--rec);background:var(--rec-bg);border:1px solid var(--rec-border);border-radius:6px;padding:6px 9px;line-height:1.45;}

/* robustness / tornado */
.vf-tor{margin:4px 0 0;}
.vf-tor-row{display:grid;grid-template-columns:170px 1fr 46px;gap:10px;align-items:center;padding:4px 0;}
.vf-tor-lab{font-size:12.5px;color:var(--ink);text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vf-tor-track{position:relative;height:12px;background:var(--track);border-radius:3px;}
.vf-tor-track::before{content:"";position:absolute;left:50%;top:-2px;bottom:-2px;width:1px;background:var(--dom);}
.vf-tor-bar{position:absolute;top:0;bottom:0;border-radius:2px;min-width:1px;}
.vf-tor-bar.pos{background:var(--front);}
.vf-tor-bar.neg{background:var(--neg);}
.vf-tor-amt{font-size:12px;font-variant-numeric:tabular-nums;font-weight:600;text-align:right;}
.vf-tor-axis{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;color:var(--faint);margin:7px 0 0;padding:0 46px 0 180px;}
.vf-tor-axis span{min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vf-wwhtbt{font-size:13px;color:var(--muted);line-height:1.55;margin:16px 0 2px;max-width:760px;}

/* scoring tab */
.vf-scroll{overflow-x:auto;}
.vf-mtable{width:100%;border-collapse:collapse;font-size:12.5px;}
.vf-mtable th{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);text-align:left;padding:6px 9px;border-bottom:1px solid var(--line);font-weight:500;}
.vf-mtable td{padding:6px 9px;border-bottom:1px solid var(--line2);vertical-align:top;}
.vf-mtable .r{text-align:right;font-variant-numeric:tabular-nums;}
.vf-note{color:var(--muted);font-size:12px;line-height:1.6;margin:22px 0 0;border-top:1px solid var(--line2);padding-top:16px;}
.vf-note-h{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:7px;}
.vf-error{color:#b00;background:#fff0f0;padding:12px;border-radius:8px;white-space:pre-wrap;font-family:var(--mono);}

/* ---------- CONTROLS DRAWER (fullscreen only) ---------- */
.vf-drawer-backdrop{position:fixed;inset:0;background:rgba(16,24,38,.20);opacity:0;visibility:hidden;transition:opacity .2s ease;z-index:59;}
.vf-card.vf-drawer-on .vf-drawer-backdrop{opacity:1;visibility:visible;}
.vf-drawer{position:fixed;top:0;right:0;height:100%;width:min(390px,92vw);background:var(--card);border-left:1px solid var(--line);box-shadow:-12px 0 30px rgba(16,24,38,.14);z-index:60;display:none;flex-direction:column;}
.vf-card.vf-drawer-on .vf-drawer{display:flex;animation:vf-din-x .2s ease both;}
.vf-card.vf-drawer-on .vf-chart-tools{display:none;}
@keyframes vf-din-x{from{transform:translateX(24px);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes vf-din-y{from{transform:translateY(40px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.vf-drawer-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:14px 14px 12px 18px;border-bottom:1px solid var(--line2);flex:0 0 auto;}
.vf-drawer-title{font-family:var(--serif);font-weight:600;font-size:15.5px;}
.vf-drawer-close{width:32px;height:32px;border:1px solid var(--line);background:var(--bg);border-radius:8px;font-size:20px;line-height:1;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.vf-drawer-close:hover{color:var(--ink);border-color:var(--dom);}
.vf-drawer-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 16px 20px;}
.vf-drawer-body .vf-controls{border:none;background:none;padding:12px 0 0;}

/* ===== mobile density pass — everything compacts so it stops being a long scroll ===== */
@media(max-width:640px){
  :root{--appbar-h:48px;}
  #vf-app{padding:0 15px 56px;}
  .vf-appbar{margin:0 -15px;padding:0 15px;}
  .vf-brand-name{font-size:14px;}
  .vf-brand-mark{width:16px;height:16px;}
  .vf-appbar-reset{padding:6px 12px;font-size:12px;}
  .vf-top{padding:20px 0 2px;}
  /* verdict stays the lead, tightened */
  .vf-verdict{padding:13px 15px 14px;border-radius:12px;}
  .vf-tabnav{padding:3px;}
  .vf-tab{font-size:13px;padding:8px 13px;}
  .vf-kicker{margin-bottom:7px;}
  .vf-h1{font-size:26px;}

  /* verdict: tighter, but still the lead */
  .vf-verdict{margin:9px 0 13px;padding-left:12px;}
  .vf-verdict-head{font-size:14.5px;line-height:1.42;}
  .vf-verdict-lead{font-size:15.5px;}
  .vf-verdict-flip{font-size:11.5px;margin-top:6px;}

  /* chart header + tools: stop the overlap (icon-only adjust, compact cluster pinned to the empty top-right) */
  .vf-charthead{margin-bottom:5px;}
  .vf-h2{font-size:17px;}
  .vf-cap{font-size:11px;margin-top:3px;}
  .vf-chart-tools{gap:4px;top:8px;right:8px;}
  .vf-tool{width:32px;height:30px;font-size:15px;}
  .vf-tool-adjust{width:32px;padding:0;}
  .vf-tool-adjust .vf-tool-tx{display:none;}
  .vf-segp{padding:0 8px;font-size:11px;height:30px;}

  /* controls: compact; the lens list becomes ONE swipeable row instead of 7 stacked chips */
  .vf-controls{padding:12px 13px;}
  .vf-controls-slot{margin-top:12px;}
  .vf-wbar{margin-bottom:11px;padding-bottom:11px;}
  .vf-wbar-keys{gap:3px 10px;}
  .vf-wbar-key{font-size:10px;}
  .vf-prios{margin:12px 0 2px;}
  .vf-prios-h{margin-bottom:9px;}
  .vf-wts{gap:3px 18px;margin-top:8px;}
  .vf-wt{font-size:12px;}
  .vf-ctrl-primary{gap:15px;}
  .vf-ctrl-primary .vf-chips{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:3px;scrollbar-width:none;}
  .vf-ctrl-primary .vf-chips::-webkit-scrollbar{display:none;}
  .vf-ctrl-primary .vf-chip{flex:0 0 auto;}
  .vf-chip{padding:7px 12px;font-size:12px;}
  .vf-seg{padding:8px 14px;font-size:12.5px;}

  /* inspector: tighter */
  .vf-detail{padding:16px 16px;}
  .vf-detail-name{font-size:19px;}
  .vf-stat{gap:20px;margin-top:12px;}
  .vf-stat-val{font-size:22px;}

  /* tabs */
  .vf-tabs{margin-top:26px;}
  .vf-tab{font-size:13.5px;padding:8px 12px;}
  .vf-tor-row{grid-template-columns:104px 1fr 40px;}
  .vf-tor-lab{font-size:11.5px;}
  .vf-tor-axis{padding-left:114px;padding-right:40px;}
}

@media(max-width:560px){
  .vf-drawer{top:auto;bottom:0;left:0;right:0;width:100%;height:auto;max-height:86vh;border-left:none;border-top:1px solid var(--line);border-radius:16px 16px 0 0;box-shadow:0 -12px 30px rgba(16,24,38,.16);}
  .vf-card.vf-drawer-on .vf-drawer{animation-name:vf-din-y;}
}
@media(max-width:420px){
  .vf-h1{font-size:24px;}
  .vf-tor-row{grid-template-columns:84px 1fr 34px;gap:6px;}
  .vf-tor-axis{padding-left:90px;padding-right:34px;font-size:10px;}
}
/* ============================================================
   v1.0 — Overview tab IA · All-options rank/select/best-in-class ·
   Compare why · chart legend + axis break · density & a11y
   ============================================================ */
.vf-overview,.vf-tabcontent{min-width:0;}
/* verdict: one-liner + jump up top; full reasoning card reused inside How-solid */
.vf-verdict-intab{margin:0 0 20px;}

/* All-options: comparison toolbar */
.vf-tl-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin:0 2px 12px;}
.vf-tl-toolnote{font-size:12px;color:var(--muted);}
.vf-tl-cmpbtn{font-family:inherit;font-size:12.5px;font-weight:500;color:#fff;background:var(--rec);border:1px solid var(--rec);border-radius:var(--r-pill);padding:7px 15px;cursor:pointer;white-space:nowrap;}
.vf-tl-cmpbtn:hover{background:var(--rec-2);}
.vf-tl-cmpbtn:disabled{background:var(--track);color:var(--faint);border-color:var(--line);cursor:not-allowed;}
.vf-best-chip{display:inline-block;border:1.5px solid var(--rec);border-radius:var(--r-pill);padding:0 7px;font-size:11px;color:var(--rec);font-weight:600;}

/* All-options: rank column + sort cue */
.vf-tl-rankhead{justify-content:center !important;text-align:center;}
.vf-tl-rankcell{justify-content:center;}
.vf-tl-rankfig{color:var(--muted);font-weight:600;}
.vf-tl-rec .vf-tl-rankfig{color:var(--rec);}
.vf-tl-sortcue{color:var(--dom);font-size:10px;margin-left:1px;opacity:.7;}
.vf-tl-h:hover .vf-tl-sortcue{opacity:1;}
.vf-tl-h:focus-visible{outline:2px solid var(--rec);outline-offset:-2px;border-radius:0;}

/* All-options: select checkbox + best-in-class ring (the "sun with a coloured rim") */
.vf-tl-chk{flex:0 0 auto;width:20px;height:20px;accent-color:var(--rec);cursor:pointer;margin:0 4px 0 0;padding:2px;}
.vf-tl-best .vf-tl-fig{box-shadow:0 0 0 1.5px var(--rec);border-radius:var(--r-pill);padding:1px 7px;background:var(--rec-bg);color:var(--rec);font-weight:600;}

/* Compare: why per rating (collapsed by default) */
.vf-cmp-whytoggle{margin-left:auto;background:none;border:none;font-family:var(--mono);font-size:10px;letter-spacing:.03em;color:var(--rec);cursor:pointer;padding:0;}
.vf-cmp-whytoggle:hover{text-decoration:underline;}
.vf-cmp-dimcell{flex-direction:column;align-items:flex-end;gap:4px;}
.vf-cmp-cellrow{position:relative;display:flex;align-items:center;justify-content:flex-end;gap:5px;width:100%;min-height:20px;}
.vf-cmp-why{display:none;font-size:11px;color:var(--muted);line-height:1.4;text-align:left;width:100%;font-style:italic;}
.vf-cmp-why-on .vf-cmp-why{display:block;}
.vf-cmp-why .vf-conf{font-style:normal;}

/* Things you didn't want: collapsible */
.vf-pens-toggle{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;cursor:pointer;padding:0;font-family:var(--sans);font-size:13px;font-weight:600;color:var(--ink);text-align:left;}
.vf-pens-count{font-family:var(--mono);font-size:10px;color:var(--faint);background:var(--track);border-radius:var(--r-pill);padding:1px 7px;}
.vf-pens-ic{margin-left:auto;color:var(--faint);font-size:12px;}
.vf-pens-body{margin-top:11px;}
.vf-pens-hidden{display:none;}
.vf-pens-sub{font-family:var(--serif);font-style:italic;font-size:11.5px;color:var(--muted);margin-bottom:10px;}

/* chart: zig-zag axis break + inline legend */
.vf-axisbreak{fill:none;stroke:var(--faint);stroke-width:1.4;paint-order:stroke;stroke-linejoin:round;stroke-linecap:round;}
.vf-chart-legend{display:flex;flex-wrap:wrap;gap:6px 16px;justify-content:center;margin:8px 8px 2px;font-size:11px;color:var(--muted);}
.vf-lg{display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.vf-lg-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.vf-lg-front{background:var(--front);}
.vf-lg-dom{background:var(--dom);}
.vf-lg-screen{background:var(--screen);border:1px solid var(--screen-bd);}
.vf-lg-star{color:var(--rec);font-size:12px;}
.vf-lg-line{width:16px;border-top:2px solid var(--front);display:inline-block;opacity:.85;}

@media(max-width:640px){
  .vf-overview{padding-top:14px;}
  .vf-tl-cmpbtn{width:100%;}
  .vf-chart-legend{gap:4px 12px;font-size:10.5px;}
}

/* Explore-relationships tab: pick any two dimensions → scatter + trend line */
.vf-rel-intro{font-size:12.5px;color:var(--muted);margin-bottom:14px;line-height:1.5;max-width:760px;}
.vf-rel-ctrls{display:flex;align-items:flex-end;flex-wrap:wrap;gap:10px 14px;margin-bottom:16px;}
.vf-rel-ctrl{display:flex;flex-direction:column;gap:5px;}
.vf-rel-lab{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);}
.vf-rel-ctrl select{font-family:inherit;font-size:13px;padding:9px 11px;border:1px solid var(--line);border-radius:8px;background:var(--card);color:var(--ink);min-width:210px;cursor:pointer;}
.vf-rel-ctrl select:hover{border-color:var(--dom);}
.vf-rel-vs{color:var(--faint);font-size:12px;padding-bottom:10px;}
.vf-rel-note{font-size:13px;color:var(--muted);padding:24px 4px;}
.vf-rel-plotwrap{position:relative;padding:10px 10px 4px;margin-bottom:14px;}
.vf-trend{stroke:var(--rec);stroke-width:2;stroke-dasharray:7 5;opacity:.7;fill:none;stroke-linecap:round;}
.vf-pt-lab-dim{fill:var(--faint);font-weight:500;}
.vf-rel-cap{display:flex;flex-direction:column;gap:6px;padding:14px 16px;background:var(--card-2);border:1px solid var(--line);border-radius:var(--r-card);}
.vf-rel-r{font-family:var(--mono);font-size:12px;color:var(--rec);letter-spacing:.02em;}
.vf-rel-plain{font-size:14px;color:var(--ink);line-height:1.5;}
.vf-rel-foot{font-size:11.5px;color:var(--faint);line-height:1.45;}
@media(max-width:560px){.vf-rel-ctrl select{min-width:0;width:100%;}.vf-rel-ctrl{flex:1 1 100%;}}

/* ============================================================
   a11y sprint — screen-reader text alternative, tab-strip scroll cue,
   weight-bar click affordance
   ============================================================ */
/* visually-hidden but readable by assistive tech (chart text alternative, etc.) */
.vf-sr-only{position:absolute !important;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);clip-path:inset(50%);white-space:nowrap;border:0;}

/* tab strip: edge-fade cue that later tabs scroll off-screen on narrow viewports */
.vf-tabnav-wrap{position:relative;display:block;}
@media(max-width:640px){
  .vf-tabnav-wrap::after{content:"";position:absolute;top:0;right:0;bottom:0;width:30px;pointer-events:none;border-radius:0 var(--r-pill) var(--r-pill) 0;background:linear-gradient(90deg,rgba(255,255,255,0),var(--card));}
}

/* weight-bar segment → focus + flash the matching priority slider */
.vf-wt-flash{animation:vf-wt-flash 1s ease;}
@keyframes vf-wt-flash{0%,100%{background:transparent;}18%{background:var(--rec-bg);}}
.vf-wt-flash{border-radius:7px;margin:0 -6px;padding:0 6px;}

/* ============================================================
   comprehension layer — ranked bars, chart onboarding, beneficiary
   mode, plain-language sensitivity, differences-only matrix, cards
   ============================================================ */
/* chart-head right cluster: view toggle + "how to read this" */
.vf-ch-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.vf-viewtoggle{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--card);}
.vf-vt{font-size:12px;border:none;background:none;color:var(--muted);padding:6px 12px;cursor:pointer;border-right:1px solid var(--line);}
.vf-vt:last-child{border-right:none;}
.vf-vt:hover{color:var(--ink);}
.vf-vt.on{background:var(--ink);color:#fff;}
.vf-guide-btn{font-size:12px;color:var(--rec);background:var(--card);border:1px solid var(--line);border-radius:var(--r-pill);padding:6px 12px;cursor:pointer;white-space:nowrap;}
.vf-guide-btn:hover,.vf-guide-btn.on{border-color:var(--rec-border);background:var(--rec-bg);}

/* one-line plain takeaway under the chart */
.vf-takeaway{font-size:13px;color:var(--ink);line-height:1.5;margin:10px 8px 2px;padding:9px 12px;background:var(--card-2);border:1px solid var(--line);border-radius:var(--r-md);max-width:760px;}
.vf-takeaway b{color:var(--rec);font-weight:600;}

/* "?" 3-step build-up (static, no animation) */
.vf-guide{margin:10px 8px 2px;padding:12px 14px;background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--sh-1);max-width:760px;}
.vf-guide-h{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:9px;}
.vf-guide-steps{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;counter-reset:none;}
.vf-guide-steps li{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--ink);line-height:1.45;}
.vf-guide-n{flex:0 0 auto;width:20px;height:20px;border-radius:50%;background:var(--rec);color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;}
.vf-guide-tx{flex:1;}

/* ranked bars: one stacked bar per option */
.vf-ranked{border:1px solid var(--line);border-radius:var(--r-md);background:var(--card);overflow:hidden;}
.vf-rk-headrow{display:grid;grid-template-columns:minmax(96px,150px) 1fr 50px minmax(56px,auto);gap:10px;align-items:center;padding:8px 12px;background:var(--head);border-bottom:1px solid var(--line);font-family:var(--mono);font-size:9.5px;letter-spacing:.03em;text-transform:uppercase;color:var(--faint);}
.vf-rk-h-val,.vf-rk-h-cost{text-align:right;}
.vf-rk-h-bar{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vf-rk-row{display:grid;grid-template-columns:minmax(96px,150px) 1fr 50px minmax(56px,auto);gap:10px;align-items:center;width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line2);padding:9px 12px;cursor:pointer;font-family:inherit;}
.vf-rk-row:last-child{border-bottom:none;}
.vf-rk-row:hover,.vf-rk-row.vf-brush-hot{background:rgba(15,24,38,.045);}
.vf-rk-rec{background:var(--rec-bg);}
.vf-rk-sel{box-shadow:inset 3px 0 0 var(--rec);}
.vf-rk-name{font-size:12.5px;color:var(--ink);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.vf-rk-rec .vf-rk-name{font-weight:600;}
.vf-rk-star{color:var(--rec);}
.vf-rk-cap{display:block;font-size:10px;color:var(--warn);font-style:italic;}
.vf-rk-track{display:flex;height:18px;border-radius:5px;overflow:hidden;background:var(--track);border:1px solid var(--line);min-width:0;}
.vf-rk-seg{height:100%;border-right:1px solid rgba(255,255,255,.5);}
.vf-rk-seg:last-child{border-right:none;}
.vf-rk-neg{background:repeating-linear-gradient(45deg,var(--neg),var(--neg) 3px,#d67c66 3px,#d67c66 6px);opacity:.85;}
.vf-rk-val{font-variant-numeric:tabular-nums;font-size:13px;font-weight:600;color:var(--ink);text-align:right;}
.vf-rk-cost{font-variant-numeric:tabular-nums;font-size:12.5px;color:var(--rec);text-align:right;white-space:nowrap;}
.vf-rk-empty{padding:28px 16px;text-align:center;color:var(--muted);font-size:13px;}

/* beneficiary verdict-first block */
.vf-ben-verdict{display:flex;flex-direction:column;gap:6px;}
.vf-ben-lead{font-family:var(--serif);font-size:19px;font-weight:600;color:var(--ink);}
.vf-ben-lead b{color:var(--rec);}
.vf-ben-why{font-size:14px;color:var(--muted);line-height:1.5;max-width:720px;}
.vf-ben-facts{display:flex;gap:22px;flex-wrap:wrap;margin-top:6px;}
.vf-ben-fact{display:flex;flex-direction:column;}
.vf-ben-fact-n{font-family:var(--serif);font-size:18px;font-weight:600;color:var(--ink);}
.vf-ben-fact-l{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);}

/* weights-proxied banner in the recipe */
.vf-wbar-proxy{font-size:12px;color:var(--rec);background:var(--rec-bg);border:1px solid var(--rec-border);border-radius:var(--r-sm);padding:8px 11px;margin-bottom:11px;line-height:1.4;}

/* pre-expanded worked-example why */
.vf-wf-why-shown{display:block !important;}
.vf-wf-worked{font-family:var(--mono);font-style:normal;font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:var(--front);background:var(--front-bg);border:1px solid var(--front-border);border-radius:4px;padding:1px 5px;margin-right:5px;vertical-align:1px;}

/* robustness line + flip sentences */
.vf-robline{font-size:13.5px;color:var(--ink);line-height:1.5;margin:0 0 16px;padding:11px 14px;background:var(--front-bg);border:1px solid var(--front-border);border-radius:var(--r-md);}
.vf-robline-lead{font-weight:600;color:var(--front);}
.vf-flip-list{list-style:none;margin:0 0 12px;padding:0;display:flex;flex-direction:column;gap:7px;}
.vf-flip{font-size:13px;line-height:1.5;color:var(--ink);padding-left:22px;position:relative;}
.vf-flip::before{position:absolute;left:0;top:0;font-family:var(--mono);}
.vf-flip-yes::before{content:"⤳";color:var(--rec);}
.vf-flip-no::before{content:"✓";color:var(--front);}
.vf-flip b{font-weight:600;}
.vf-flip-more,.vf-tor-details{margin:0 0 14px;}
.vf-flip-more>summary,.vf-tor-details>summary{cursor:pointer;font-size:12.5px;color:var(--rec);font-weight:500;list-style:none;}
.vf-flip-more>summary::-webkit-details-marker,.vf-tor-details>summary::-webkit-details-marker{display:none;}
.vf-flip-more>summary::before,.vf-tor-details>summary::before{content:"▸ ";color:var(--faint);}
.vf-flip-more[open]>summary::before,.vf-tor-details[open]>summary::before{content:"▾ ";}
.vf-tor-details{margin-top:8px;}
.vf-tor-details .vf-tor{margin-top:12px;}

/* even-swap line in Compare */
.vf-cmp-swap{font-size:13px;color:var(--ink);background:var(--card-2);border:1px solid var(--line);border-left:3px solid var(--rec);border-radius:var(--r-sm);padding:9px 12px;margin-bottom:16px;line-height:1.45;}
.vf-cmp-swap-lead{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--rec);font-weight:600;}
.vf-cmp-pick-2{grid-template-columns:1fr auto 1fr;align-items:center;}
.vf-cmp-swapbtn{width:38px;height:38px;border:1px solid var(--line);background:var(--card);border-radius:8px;font-size:16px;color:var(--muted);cursor:pointer;}
.vf-cmp-swapbtn:hover{border-color:var(--dom);color:var(--ink);}

/* matrix toolbar toggles + differences strip + best-in-class tick */
.vf-tl-toolctrls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.vf-tl-toggle{font-size:12px;color:var(--muted);background:var(--card);border:1px solid var(--line);border-radius:var(--r-pill);padding:6px 13px;cursor:pointer;white-space:nowrap;}
.vf-tl-toggle:hover{border-color:var(--dom);color:var(--ink);}
.vf-tl-toggle.on{background:var(--ink);color:#fff;border-color:var(--ink);}
.vf-tl-equal{font-size:12px;color:var(--muted);background:var(--line3);border-radius:var(--r-sm);padding:8px 12px;margin:0 2px 12px;line-height:1.4;}
.vf-tl-tick{color:var(--rec);font-size:10px;line-height:1;margin-left:2px;}

/* mobile: matrix as stacked product cards */
.vf-cards{display:flex;flex-direction:column;gap:12px;}
.vf-card-item{display:block;min-width:0;border:1px solid var(--line);border-radius:var(--r-md);background:var(--card);padding:12px 13px;box-shadow:var(--sh-1);}
.vf-card-item.vf-tl-rec{border-color:var(--rec-border);box-shadow:inset 3px 0 0 var(--rec),var(--sh-1);}
.vf-card-item.vf-tl-dim{opacity:.6;}
.vf-card-item.vf-tl-sel{outline:2px solid var(--rec);outline-offset:-2px;}
.vf-card-head{display:flex;align-items:center;gap:8px;}
.vf-card-rank{font-family:var(--mono);font-size:12px;color:var(--faint);font-weight:600;}
.vf-card-item .vf-tl-nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:14px;font-weight:600;font-family:var(--serif);}
.vf-card-stat{display:flex;gap:16px;margin:8px 0 4px;}
.vf-card-statv{font-size:13px;color:var(--ink);font-weight:600;}
.vf-card-cost{font-size:13px;color:var(--rec);font-weight:600;}
.vf-card-dims{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.vf-card-dim{display:grid;grid-template-columns:1fr 90px 30px;gap:8px;align-items:center;font-size:11.5px;color:var(--muted);}
.vf-card-dim-lab{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.vf-card-dim-track{position:relative;height:7px;background:var(--track);border-radius:3px;overflow:hidden;}
.vf-cardbar{position:absolute;left:0;top:0;bottom:0;border-radius:3px;opacity:.7;}
.vf-cardbar.neg{opacity:.8;}
.vf-card-dim-fig{text-align:right;font-variant-numeric:tabular-nums;color:var(--ink);}
.vf-card-more{margin-top:8px;}
.vf-card-more>summary{cursor:pointer;font-size:12px;color:var(--rec);list-style:none;}
.vf-card-more>summary::-webkit-details-marker{display:none;}
.vf-card-more>summary::before{content:"▸ ";color:var(--faint);}
.vf-card-more[open]>summary::before{content:"▾ ";}

@media(max-width:640px){
  .vf-ch-r{gap:6px;}
  .vf-vt{padding:6px 10px;}
  .vf-guide-btn{padding:6px 10px;}
  .vf-rk-headrow,.vf-rk-row{grid-template-columns:minmax(72px,1fr) 1.4fr 38px auto;gap:7px;padding:8px 9px;}
  .vf-rk-name{font-size:11.5px;}
  .vf-ben-lead{font-size:17px;}
}

/* ============================================================
   print — verdict, ranked bars, sentences, expanded matrix; no chrome
   ============================================================ */
@media print{
  .vf-appbar,.vf-chart-tools,.vf-controls-slot,.vf-tabnav-wrap,.vf-tl-toolbar,.vf-ch-r,.vf-viewtoggle,.vf-guide-btn,.vf-deep-toggle,.vf-why-toggle,.vf-ctrl-toggle,.vf-drawer,.vf-drawer-backdrop,.vf-appbar-reset,.vf-tabnav{display:none !important;}
  *{position:static !important;box-shadow:none !important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  html,body{background:#fff !important;}
  #vf-app{max-width:none;padding:0;}
  .vf-workspace{grid-template-columns:1fr !important;gap:14px;}
  .vf-detail{max-height:none !important;overflow:visible !important;}
  .vf-tl,.vf-cmp-wrap{max-height:none !important;overflow:visible !important;}
  .vf-overview,.vf-tabpanel{display:block !important;}
  .vf-collapsed,.vf-detail-deep.vf-collapsed,.vf-pens-hidden{display:block !important;}
  .vf-col-why .vf-wf-why{display:block !important;}
  .vf-flip-more,.vf-tor-details,.vf-card-more{display:block !important;}
  .vf-flip-more>summary,.vf-tor-details>summary,.vf-card-more>summary,.vf-adv>summary{display:none !important;}
  .vf-tl-row,.vf-rk-row,.vf-flip,.vf-cmp-row{break-inside:avoid;}
  .vf-guide{display:none !important;}
}

@media (prefers-reduced-motion: reduce){*{transition:none !important;animation:none !important;}}

/* ============================================================
   priority elicitation — modal questionnaire (VFElicit)
   ============================================================ */
.vf-elic-open{font-family:var(--sans);font-size:12px;font-weight:600;color:#fff;background:var(--rec);border:1px solid var(--rec);border-radius:var(--r-pill);padding:5px 13px;cursor:pointer;margin-right:8px;white-space:nowrap;}
.vf-elic-open:hover{background:var(--rec-2);}
.vf-elic-back{position:fixed;inset:0;z-index:80;background:rgba(15,24,38,.34);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:20px;}
.vf-elic{background:var(--card);border:1px solid var(--line);border-radius:var(--r-card);box-shadow:var(--sh-pop);width:100%;max-width:720px;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;}
.vf-elic-head{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line2);flex:0 0 auto;}
.vf-elic-title{font-weight:700;font-size:15px;color:var(--ink);}
.vf-elic-sub{font-size:12px;color:var(--muted);}
.vf-elic-x{margin-left:auto;width:30px;height:30px;border:1px solid var(--line);background:var(--card);border-radius:8px;font-size:19px;line-height:1;color:var(--muted);cursor:pointer;flex:0 0 auto;}
.vf-elic-x:hover{color:var(--ink);border-color:var(--dom);}
.vf-elic-q{padding:18px;overflow-y:auto;flex:1 1 auto;}
.vf-elic-qtop{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.vf-elic-qn{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);}
.vf-elic-fmt{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--rec);border:1px solid var(--rec-border);background:var(--rec-bg);border-radius:var(--r-pill);padding:2px 9px;}
.vf-elic-qh{font-size:15px;font-weight:700;color:var(--ink);margin:8px 0 13px;}
.vf-elic-qh b{color:var(--rec);}
.vf-elic-cards{display:flex;flex-direction:column;gap:9px;}
.vf-elic-opt{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1.5px solid var(--line);border-radius:var(--r-sm);cursor:pointer;background:var(--card);transition:border-color .1s,background .1s;}
.vf-elic-opt:hover{border-color:var(--rec-border);}
.vf-elic-omain{flex:1;min-width:0;}
.vf-elic-on{font-size:13.5px;font-weight:600;color:var(--ink);}
.vf-elic-osw{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:2px;}
.vf-elic-osw b{color:var(--muted);}
.vf-elic-badges{display:flex;gap:6px;flex:0 0 auto;}
.vf-elic-b{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;font-weight:700;padding:4px 9px;border-radius:var(--r-pill);border:1px solid;background:var(--card);cursor:pointer;}
.vf-elic-bm{color:var(--rec);border-color:var(--rec-border);} .vf-elic-bl{color:var(--muted);border-color:var(--line);}
.vf-elic-opt.vf-elic-most{border-color:var(--rec);background:var(--rec-bg);}
.vf-elic-opt.vf-elic-most .vf-elic-bm{background:var(--rec);color:#fff;border-color:var(--rec);}
.vf-elic-opt.vf-elic-least{border-color:var(--dom);background:var(--card-2);}
.vf-elic-opt.vf-elic-least .vf-elic-bl{background:var(--muted);color:#fff;border-color:var(--muted);}
.vf-elic-foot2{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:14px;}
.vf-elic-hint{font-size:11.5px;color:var(--faint);}
.vf-elic-next{font-family:var(--sans);font-size:13px;font-weight:600;color:#fff;background:var(--rec);border:1px solid var(--rec);border-radius:var(--r-pill);padding:8px 18px;cursor:pointer;}
.vf-elic-next:disabled{background:var(--track);color:var(--faint);border-color:var(--line);cursor:not-allowed;}
.vf-elic-side{padding:0 18px 12px;flex:0 0 auto;}
.vf-elic-meter-lab{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);display:flex;justify-content:space-between;align-items:baseline;}
.vf-elic-meter-lab b{color:var(--rec);font-size:13px;}
.vf-elic-meter{height:10px;background:var(--track);border-radius:5px;overflow:hidden;margin:6px 0 12px;}
.vf-elic-fill{display:block;height:100%;width:0;background:var(--rec);border-radius:5px;transition:width .4s cubic-bezier(.3,.7,.3,1);}
.vf-elic-podh{font-family:var(--mono);font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);margin-bottom:5px;}
.vf-elic-lock{font-family:var(--mono);font-size:8.5px;letter-spacing:.05em;color:var(--rec);border:1px solid var(--rec-border);background:var(--rec-bg);border-radius:var(--r-pill);padding:1px 6px;margin-left:6px;}
.vf-elic-lad{display:flex;flex-direction:column;max-height:34vh;overflow-y:auto;}

ria). EFFETTO SULLA SCELTA: knee/scelta INVARIATI = Sennheiser Momentum 5 (€399, valore 74.6) — regge nonostante le sue riduzioni ANC/suono/chiamate perché nessun rivale più economico è salito. La Sony COLLEXION (valore 79.4) resta il 'bell'oggetto' in cima, e correggere ANC/chiamate/costruzione della Px8 S2 ha ALLARGATO il vantaggio della Collexion a ~4 punti di valore a €1 in meno — quindi la Px8 S2 (valore 75.6, di nuovo sulla frontiera a €628) è ora un chiaro gradino SOTTO la Collexion, non la sua pari. L'XM6 è invariato — ogni sua cella è stata confermata in modo indipendente (RTINGS -28.4dB, l'ANC più profondo misurato qui; MDAQS al vertice ma scena misurabilmente stretta). NON RISOLTI / da provare in negozio: l'eardrum-suck del Bose (un singolo report contestato), il CALORE di Collexion + Px7 S3 (la sua unica lacuna — non misurato in nessuna fonte) e la Dali IO-8 in generale (di fatto non misurata — nessun dB/THD/MDAQS di laboratorio). || REVISIONE DELL'INTERO ECOSISTEMA (2026-07-07, sua richiesta — estrarre OGNI recensione dall'intero set di fonti mappate e triangolare): un workflow multi-agente ha raccolto recensioni singole + comparative da RTINGS, ASR, Crinacle, Erin's, GoldenSound, The Headphone Show, SoundGuys, Wirecutter, Consumer Reports, What Hi-Fi, Headphonecheck, Head-Fi, Reddit e recensioni dei negozi (71 agenti di raccolta, 20 triangolatori per-prodotto con la regola >=2 classi di evidenza indipendenti, 11 calibratori per-dimensione, verifica avversariale a 3 lenti di ogni modifica, + audit di copertura e dimensioni). 33 celle ri-ancorate (+3 correzioni fattuali dei 'why'), ~17 respinte. GINOCCHIO/SCELTA INVARIATI = Momentum 5 (74.6->73.9); la Collexion resta il miglior oggetto (79.4); frontiera invariata. IN PRIMO PIANO: le XM6 sono crollate come oggetto costruito (71.0->67.7) — costruzione 4->3 (la cerniera ridisegnata si crepa ANCORA, prima delle XM5: sondaggio SoundGuys ott-2025 n=1760, 24% rotture, Sony nega la garanzia come 'danno fisico'),   // halve each positive weight in turn, renormalise, re-pick — which single priority change flips the recommendation

<script>/* Value Frontier — adaptive preference elicitation (elicit.js)
 *
 * Learns per-dimension weights from a buyer's best-worst / pairwise CHOICES over the real
 * worst→best swings the option set spans. Model: globally-concave Bradley-Terry / MNL over
 * swing-utilities; online Newton MAP + FULL-covariance Laplace posterior.
 *
 * v2 (research/11 - adaptive elicitation v2.md): confidence is defined on the PRIORITY LADDER
 * itself — adjacent-boundary dominance P(i outranks j) from the full covariance, ties declared
 * by exhaustion, importance-weighted meter, top-3 lock; questions run coverage (near-BIBD) →
 * weakest-boundary face-offs → endless spacing/consistency probes with a PSER honesty signal.
 * SMAA pickP (v1's meter) remains available via confidence() but is display-only (footer):
 * it measures the product pick, not the priorities.
 *
 * Pure + dependency-free. Inlined into each rendered page next to engine.js; also node-testable.
 * Requires globalThis.ValueFrontier (engine.js) at call time for compute()/smaa().
 */
(function () {
  'use strict';
  var VERSION = '2.2.0';
  // calibrated hyper-parameters (see engine/elicit.test.mjs calibration harness).
  // BETA/TAU2 shape the LIKELIHOOD (learned utilities + confidence); TEMP/FLOOR/SPREAD_CAP shape
  // only the utility→weight-SHARE map (display + applyElic), never the confidence.
  //   v2.1: TEMP 3.4→1.3, FLOOR 0.02→0.012 — old TEMP≈BETA made shares the MNL "how often is this
  //         your #1" quantity (winner-take-most): overstated the leader, floored the tail.
  //   v2.2: SPREAD_CAP — consistent answers grow the BT utility scale without bound (separable
  //         data, only the weak prior slows it), so the top weight INFLATED the more you answered
  //         (deterministic single-top: 52%→73% over 6→50 questions). The cap shrinks (never
  //         amplifies) the utility spread before the softmax, so weight MAGNITUDE tracks the
  //         preference SHAPE, not the confirmation count — a single-issue buyer now caps ~50%
  //         and stays there. Confidence still rises with every answer (it reads u,S directly).
  var TEMP = 1.3, BETA = 3.2, TAU2 = 5, FLOOR = 0.012, SPREAD_CAP = 0.9;
  // v2 boundary-confidence parameters (research/11 - adaptive elicitation v2.md):
  // a boundary counts as an honest TIE after TIE_ASKS co-occurrences still below TIE_BELOW;
  // PSER_EPS = predicted meter gain under which more answers are declared not to help.
  var TIE_ASKS = 3, TIE_BELOW = 0.75, PSER_EPS = 0.005;

  function VF() { return (typeof globalThis !== 'undefined' ? globalThis : this).ValueFrontier; }
  function sig(x) { return 1 / (1 + Math.exp(-x)); }

  // ---- linear algebra (small D, hand-rolled) ----
  function inv(M) {
    var n = M.length, A = [], a, b, i, r;
    for (a = 0; a < n; a++) { A[a] = []; for (b = 0; b < n; b++) A[a][b] = M[a][b]; for (b = 0; b < n; b++) A[a][n + b] = (a === b) ? 1 : 0; }
    for (i = 0; i < n; i++) {

  }
  function chol(S) {

    return L;
  }

  function antiDims(data) { return (data.dimensions || []).filter(function (d) { return d.direction === 'unwanted'; }); }
